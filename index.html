<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.css"/>
    <title>Frontend Mentor | Results summary component</title>

    </style>
  </head>
  <body>
    <main>
      <article class="card">
        <header class="card__header">
          <h1 class="card__heading">Your Result</h1>
          <div class="card__result-container">
            <p class="card__result"><span class="card__result-average">76</span> of 100</p>
          </div>
          <p class="card__result-text">Great</p>
          <p class="card__result-description">You scored higher than 65% of the people who
    have taken these tests.</p>
        </header>
        <main class="card__main">
          <p class="card__summary-title">Summary</p>
          <ul class="card__summary">
          
          </ul>
          <button class="card__footer-btn" role="button">Continue</button>
        </main>
      </article>
    </main>
  </body>
  <script src="./index.js"></script>
</html>
